<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes nodeAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes drawLine { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
    @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 3px rgba(239,68,68,0.3)); } 50% { filter: drop-shadow(0 0 8px rgba(239,68,68,0.6)); } }
    .node-build { animation: nodeAppear 0.5s ease-out 0.3s both; }
    .node-lint { animation: nodeAppear 0.5s ease-out 0.8s both; }
    .node-test { animation: nodeAppear 0.5s ease-out 1.1s both; }
    .node-deploy { animation: nodeAppear 0.5s ease-out 1.6s both; }
    .edge-1 { animation: drawLine 0.6s ease-out 1.4s both; stroke-dasharray: 200; }
    .edge-2 { animation: drawLine 0.6s ease-out 1.6s both; stroke-dasharray: 200; }
    .edge-3 { animation: drawLine 0.6s ease-out 2.0s both; stroke-dasharray: 200; }
    .edge-4 { animation: drawLine 0.6s ease-out 2.2s both; stroke-dasharray: 200; }
    .legend { animation: fadeIn 0.5s ease-out 0.2s both; }
    .title { animation: fadeIn 0.4s ease-out; }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0a0a"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444"/>
    </marker>
    <marker id="arrowRedDash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ef4444" opacity="0.6"/>
    </marker>
    <filter id="nodeGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Panel frame -->
  <g transform="translate(40, 20)">
    <rect x="0" y="0" width="720" height="360" rx="8" ry="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="720" height="30" rx="8" ry="8" fill="#2d2d2d"/>
    <rect x="0" y="18" width="720" height="12" fill="#2d2d2d"/>
    <circle cx="16" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="52" cy="15" r="5" fill="#28c840"/>

    <!-- Panel title -->
    <g class="title">
      <text x="360" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Pipeline Visualization</text>
    </g>

    <!-- Tab -->
    <rect x="0" y="30" width="160" height="26" fill="#1e1e1e"/>
    <g transform="translate(8, 33)">
      <rect x="0" y="2" width="18" height="18" rx="4" fill="#ef4444" opacity="0.8"/>
      <text x="9" y="15" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="white" text-anchor="middle">Tb</text>
    </g>
    <text x="32" y="47" font-family="'Cascadia Code', monospace" font-size="11" fill="#d4d4d4">Pipeline DAG</text>
    <rect x="0" y="54" width="160" height="2" fill="#ef4444"/>

    <!-- Legend -->
    <g class="legend" transform="translate(480, 46)">
      <rect x="0" y="0" width="220" height="22" rx="4" fill="#252526" opacity="0.8"/>
      <rect x="8" y="5" width="12" height="12" rx="3" fill="#2563eb"/>
      <text x="24" y="15" font-family="'Cascadia Code', monospace" font-size="9" fill="#888">cached</text>
      <rect x="72" y="5" width="12" height="12" rx="3" fill="#16a34a"/>
      <text x="88" y="15" font-family="'Cascadia Code', monospace" font-size="9" fill="#888">no-cache</text>
      <rect x="146" y="5" width="12" height="12" rx="3" fill="#9333ea"/>
      <text x="162" y="15" font-family="'Cascadia Code', monospace" font-size="9" fill="#888">persistent</text>
    </g>

    <!-- DAG Graph -->
    <g transform="translate(360, 200)">

      <!-- Edges (behind nodes) -->
      <!-- build -> test -->
      <line class="edge-1" x1="0" y1="-70" x2="-120" y2="10" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
      <!-- build -> lint -->
      <line class="edge-2" x1="0" y1="-70" x2="120" y2="10" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
      <!-- test -> deploy (dashed for topological dep) -->
      <line class="edge-3" x1="-120" y1="50" x2="0" y2="110" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRedDash)" opacity="0.7"/>
      <!-- lint -> deploy -->
      <line class="edge-4" x1="120" y1="50" x2="0" y2="110" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRedDash)" opacity="0.7"/>

      <!-- build node (cached = blue) -->
      <g class="node-build" transform="translate(0, -100)" filter="url(#nodeGlow)">
        <rect x="-65" y="0" width="130" height="50" rx="10" fill="#1a1a2e" stroke="#2563eb" stroke-width="2"/>
        <rect x="-65" y="0" width="130" height="50" rx="10" fill="#2563eb" opacity="0.1"/>
        <text x="0" y="24" font-family="'Cascadia Code', monospace" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="600">build</text>
        <text x="0" y="40" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa" text-anchor="middle">cached</text>
      </g>

      <!-- test node (cached = blue) -->
      <g class="node-test" transform="translate(-120, 10)" filter="url(#nodeGlow)">
        <rect x="-55" y="0" width="110" height="50" rx="10" fill="#1a1a2e" stroke="#2563eb" stroke-width="2"/>
        <rect x="-55" y="0" width="110" height="50" rx="10" fill="#2563eb" opacity="0.1"/>
        <text x="0" y="24" font-family="'Cascadia Code', monospace" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="600">test</text>
        <text x="0" y="40" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa" text-anchor="middle">cached</text>
      </g>

      <!-- lint node (cached = blue) -->
      <g class="node-lint" transform="translate(120, 10)" filter="url(#nodeGlow)">
        <rect x="-55" y="0" width="110" height="50" rx="10" fill="#1a1a2e" stroke="#2563eb" stroke-width="2"/>
        <rect x="-55" y="0" width="110" height="50" rx="10" fill="#2563eb" opacity="0.1"/>
        <text x="0" y="24" font-family="'Cascadia Code', monospace" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="600">lint</text>
        <text x="0" y="40" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa" text-anchor="middle">cached</text>
      </g>

      <!-- deploy node (no-cache = green) -->
      <g class="node-deploy" transform="translate(0, 110)" filter="url(#nodeGlow)">
        <rect x="-65" y="0" width="130" height="50" rx="10" fill="#0a1a0e" stroke="#16a34a" stroke-width="2"/>
        <rect x="-65" y="0" width="130" height="50" rx="10" fill="#16a34a" opacity="0.1"/>
        <text x="0" y="24" font-family="'Cascadia Code', monospace" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="600">deploy</text>
        <text x="0" y="40" font-family="'Cascadia Code', monospace" font-size="9" fill="#4ade80" text-anchor="middle">no-cache</text>
      </g>
    </g>

    <!-- Dependency info -->
    <g transform="translate(30, 320)" font-family="'Cascadia Code', monospace" font-size="10" fill="#555">
      <line x1="0" y1="5" x2="30" y2="5" stroke="#ef4444" stroke-width="2"/>
      <text x="36" y="9">direct dependency</text>
      <line x1="160" y1="5" x2="190" y2="5" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
      <text x="196" y="9">topological dependency</text>
    </g>
  </g>
</svg>