<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes typeChar { 0%, 60% { opacity: 0; } 61%, 100% { opacity: 1; } }
    .editor { animation: fadeIn 0.5s ease-out; }
    .dropdown { animation: slideDown 0.6s ease-out 1.5s both; }
    .drop-item-0 { animation: fadeIn 0.3s ease-out 1.6s both; }
    .drop-item-1 { animation: fadeIn 0.3s ease-out 1.8s both; }
    .drop-item-2 { animation: fadeIn 0.3s ease-out 2.0s both; }
    .drop-item-3 { animation: fadeIn 0.3s ease-out 2.2s both; }
    .drop-item-4 { animation: fadeIn 0.3s ease-out 2.4s both; }
    .drop-item-5 { animation: fadeIn 0.3s ease-out 2.6s both; }
    .drop-item-6 { animation: fadeIn 0.3s ease-out 2.8s both; }
    .cursor { animation: blink 1s step-end infinite 1.2s; }
    .typed { animation: typeChar 3s ease-out forwards; }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Editor window -->
  <g class="editor" transform="translate(40, 20)">
    <rect x="0" y="0" width="720" height="360" rx="8" ry="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="720" height="30" rx="8" ry="8" fill="#2d2d2d"/>
    <rect x="0" y="18" width="720" height="12" fill="#2d2d2d"/>
    <circle cx="16" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="52" cy="15" r="5" fill="#28c840"/>
    <text x="360" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">turbo.json</text>

    <!-- Tab -->
    <rect x="0" y="30" width="130" height="26" fill="#1e1e1e"/>
    <text x="12" y="47" font-family="'Cascadia Code', monospace" font-size="11" fill="#d4d4d4">turbo.json</text>
    <rect x="0" y="54" width="130" height="2" fill="#ef4444"/>

    <!-- Code content -->
    <g transform="translate(12, 72)" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="14">
      <!-- Line numbers -->
      <g fill="#555">
        <text x="0" y="0">1</text>
        <text x="0" y="22">2</text>
        <text x="0" y="44">3</text>
        <text x="0" y="66">4</text>
        <text x="0" y="88">5</text>
        <text x="0" y="110">6</text>
        <text x="0" y="132">7</text>
        <text x="0" y="154">8</text>
        <text x="0" y="176">9</text>
        <text x="0" y="198">10</text>
        <text x="0" y="220">11</text>
        <text x="0" y="242">12</text>
      </g>

      <!-- Code lines -->
      <g transform="translate(35, 0)">
        <text y="0" fill="#d4d4d4">{</text>

        <text y="22">
          <tspan fill="#9cdcfe">"$schema"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">"https://turbo.build/schema.json"</tspan><tspan fill="#d4d4d4">,</tspan>
        </text>

        <text y="44">
          <tspan fill="#9cdcfe">"tasks"</tspan><tspan fill="#d4d4d4">: {</tspan>
        </text>

        <text y="66">
          <tspan fill="#d4d4d4">  </tspan><tspan fill="#9cdcfe">"build"</tspan><tspan fill="#d4d4d4">: {</tspan>
        </text>

        <text y="88">
          <tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"dependsOn"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"^build"</tspan><tspan fill="#d4d4d4">],</tspan>
        </text>

        <text y="110">
          <tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"outputs"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"dist/**"</tspan><tspan fill="#d4d4d4">],</tspan>
        </text>

        <text y="132">
          <tspan fill="#d4d4d4">    </tspan>
        </text>

        <!-- Cursor -->
        <rect class="cursor" x="34" y="120" width="2" height="16" fill="#ef4444"/>

        <text y="154"><tspan fill="#d4d4d4">  },</tspan></text>
        <text y="176"><tspan fill="#d4d4d4">  </tspan><tspan fill="#9cdcfe">"dev"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="198"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"persistent"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#569cd6">true</tspan></text>
        <text y="220"><tspan fill="#d4d4d4">  }</tspan></text>
        <text y="242"><tspan fill="#d4d4d4">}</tspan></text>
      </g>
    </g>

    <!-- Completion dropdown -->
    <g class="dropdown" transform="translate(82, 195)">
      <rect x="0" y="0" width="300" height="180" rx="4" ry="4" fill="#252526" stroke="#454545" stroke-width="1"/>

      <g font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13">
        <!-- dependsOn - selected -->
        <g class="drop-item-0">
          <rect x="2" y="2" width="296" height="24" rx="2" fill="#04395e"/>
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.85"/>
          <text x="13" y="19" font-size="9" fill="white" font-weight="bold">Tb</text>
          <text x="30" y="19" fill="#ffffff" font-weight="600">dependsOn</text>
          <text x="230" y="19" fill="#888" font-size="10">string[]</text>
        </g>

        <!-- inputs -->
        <g class="drop-item-1" transform="translate(0, 26)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">inputs</text>
          <text x="230" y="19" fill="#888" font-size="10">string[]</text>
        </g>

        <!-- outputs -->
        <g class="drop-item-2" transform="translate(0, 52)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">outputs</text>
          <text x="230" y="19" fill="#888" font-size="10">string[]</text>
        </g>

        <!-- outputLogs -->
        <g class="drop-item-3" transform="translate(0, 78)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">outputLogs</text>
          <text x="230" y="19" fill="#888" font-size="10">string</text>
        </g>

        <!-- cache -->
        <g class="drop-item-4" transform="translate(0, 104)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">cache</text>
          <text x="230" y="19" fill="#888" font-size="10">boolean</text>
        </g>

        <!-- persistent -->
        <g class="drop-item-5" transform="translate(0, 130)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">persistent</text>
          <text x="230" y="19" fill="#888" font-size="10">boolean</text>
        </g>

        <!-- env -->
        <g class="drop-item-6" transform="translate(0, 156)">
          <rect x="8" y="6" width="16" height="16" rx="3" fill="#ef4444" opacity="0.4"/>
          <text x="13" y="19" font-size="9" fill="white">Tb</text>
          <text x="30" y="19" fill="#d4d4d4">env</text>
          <text x="230" y="19" fill="#888" font-size="10">string[]</text>
        </g>
      </g>
    </g>
  </g>
</svg>