<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0a0a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#redGlow)"/>

  <!-- Red accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#ef4444" opacity="0.8"/>

  <!-- Left side: Icon + Title -->
  <g transform="translate(60, 120)">
    <!-- Icon -->
    <rect x="0" y="0" width="90" height="90" rx="18" ry="18" fill="#ef4444" filter="url(#shadow)"/>
    <text x="45" y="62" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="42" fill="white" text-anchor="middle" letter-spacing="-1">Tb</text>

    <!-- Title -->
    <text x="110" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="42" fill="#ffffff">Turborepo Toolkit</text>
    <text x="110" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="22" fill="#ef4444">for VS Code</text>
  </g>

  <!-- Left side: Features list -->
  <g transform="translate(80, 270)" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16" fill="#d4d4d4">
    <circle cx="0" cy="-5" r="4" fill="#ef4444"/>
    <text x="16" y="0">turbo.json IntelliSense</text>

    <circle cx="0" cy="35" r="4" fill="#ef4444"/>
    <text x="16" y="40">Task Explorer sidebar</text>

    <circle cx="0" cy="75" r="4" fill="#ef4444"/>
    <text x="16" y="80">Pipeline visualization</text>

    <circle cx="0" cy="115" r="4" fill="#ef4444"/>
    <text x="16" y="120">CodeLens run</text>

    <circle cx="0" cy="155" r="4" fill="#ef4444"/>
    <text x="16" y="160">Workspace discovery</text>
  </g>

  <!-- Right side: Simulated VS Code editor -->
  <g transform="translate(520, 100)" filter="url(#shadow)">
    <!-- Editor window frame -->
    <rect x="0" y="0" width="620" height="420" rx="8" ry="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="620" height="32" rx="8" ry="8" fill="#2d2d2d"/>
    <rect x="0" y="20" width="620" height="12" fill="#2d2d2d"/>
    <!-- Window dots -->
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <text x="310" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">turbo.json</text>

    <!-- Tab bar -->
    <rect x="0" y="32" width="150" height="28" fill="#1e1e1e"/>
    <rect x="0" y="32" width="150" height="28" fill="#2d2d2d" opacity="0.5"/>
    <text x="14" y="50" font-family="'Cascadia Code', monospace" font-size="11" fill="#d4d4d4">turbo.json</text>
    <rect x="0" y="58" width="150" height="2" fill="#ef4444"/>

    <!-- Editor content: turbo.json -->
    <g transform="translate(14, 75)" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="13">
      <!-- Line numbers -->
      <g fill="#555">
        <text x="0" y="0">1</text>
        <text x="0" y="20">2</text>
        <text x="0" y="40">3</text>
        <text x="0" y="60">4</text>
        <text x="0" y="80">5</text>
        <text x="0" y="100">6</text>
        <text x="0" y="120">7</text>
        <text x="0" y="140">8</text>
        <text x="0" y="160">9</text>
      </g>

      <!-- Code -->
      <g transform="translate(28, 0)">
        <text y="0" fill="#d4d4d4">{</text>
        <text y="20"><tspan fill="#9cdcfe">"tasks"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="40"><tspan fill="#9cdcfe">  "build"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="60"><tspan fill="#9cdcfe">    "dependsOn"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"^build"</tspan><tspan fill="#d4d4d4">],</tspan></text>
        <text y="80"><tspan fill="#9cdcfe">    "outputs"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"dist/**"</tspan><tspan fill="#d4d4d4">],</tspan></text>
        <text y="100"><tspan fill="#9cdcfe">    "cache"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#569cd6">true</tspan><tspan fill="#d4d4d4">,</tspan></text>
        <text y="120"><tspan fill="#d4d4d4">    |</tspan></text>
        <text y="140"><tspan fill="#d4d4d4">  },</tspan></text>
        <text y="160"><tspan fill="#d4d4d4">}</tspan></text>
      </g>

      <!-- Cursor blink -->
      <rect x="60" y="110" width="2" height="16" fill="#ef4444">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Completion dropdown -->
    <g transform="translate(80, 185)">
      <rect x="0" y="0" width="260" height="165" rx="4" ry="4" fill="#252526" stroke="#454545" stroke-width="1"/>
      <g font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12">
        <!-- Selected item -->
        <rect x="2" y="2" width="256" height="22" rx="2" fill="#04395e"/>
        <text x="26" y="17" fill="#d4d4d4">dependsOn</text>
        <text x="200" y="17" fill="#888" font-size="10">string[]</text>
        <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.8"/>
        <text x="11" y="17" font-size="9" fill="white">Tb</text>

        <g transform="translate(0, 24)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">inputs</text>
          <text x="200" y="17" fill="#888" font-size="10">string[]</text>
        </g>
        <g transform="translate(0, 48)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">outputs</text>
          <text x="200" y="17" fill="#888" font-size="10">string[]</text>
        </g>
        <g transform="translate(0, 72)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">outputLogs</text>
          <text x="200" y="17" fill="#888" font-size="10">string</text>
        </g>
        <g transform="translate(0, 96)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">cache</text>
          <text x="200" y="17" fill="#888" font-size="10">boolean</text>
        </g>
        <g transform="translate(0, 120)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">persistent</text>
          <text x="200" y="17" fill="#888" font-size="10">boolean</text>
        </g>
        <g transform="translate(0, 144)">
          <rect x="8" y="6" width="14" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
          <text x="11" y="17" font-size="9" fill="white">Tb</text>
          <text x="26" y="17" fill="#d4d4d4">env</text>
          <text x="200" y="17" fill="#888" font-size="10">string[]</text>
        </g>
      </g>
    </g>

    <!-- Mini Pipeline DAG (right side of editor) -->
    <g transform="translate(400, 75)">
      <text x="60" y="-8" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">Pipeline DAG</text>
      <rect x="0" y="-2" width="190" height="175" rx="4" ry="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

      <!-- build node -->
      <rect x="60" y="10" width="70" height="26" rx="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
      <text x="95" y="28" font-family="monospace" font-size="11" fill="white" text-anchor="middle">build</text>

      <!-- test node -->
      <rect x="15" y="70" width="60" height="26" rx="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
      <text x="45" y="88" font-family="monospace" font-size="11" fill="white" text-anchor="middle">test</text>

      <!-- lint node -->
      <rect x="115" y="70" width="60" height="26" rx="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
      <text x="145" y="88" font-family="monospace" font-size="11" fill="white" text-anchor="middle">lint</text>

      <!-- deploy node -->
      <rect x="50" y="130" width="70" height="26" rx="6" fill="#16a34a" stroke="#22c55e" stroke-width="1"/>
      <text x="85" y="148" font-family="monospace" font-size="11" fill="white" text-anchor="middle">deploy</text>

      <!-- Arrows -->
      <!-- build -> test -->
      <line x1="80" y1="36" x2="45" y2="70" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <!-- build -> lint -->
      <line x1="115" y1="36" x2="145" y2="70" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <!-- test -> deploy -->
      <line x1="45" y1="96" x2="70" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <!-- lint -> deploy -->
      <line x1="145" y1="96" x2="105" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    </g>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1a0000" opacity="0.8"/>
  <rect x="0" y="590" width="1200" height="1" fill="#ef4444" opacity="0.3"/>
  <text x="600" y="616" font-family="'Cascadia Code', monospace" font-size="14" fill="#666" text-anchor="middle">github.com/andreahlert/turborepo-vscode-toolkit</text>
</svg>