<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes expandTree { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
    .sidebar { animation: fadeIn 0.4s ease-out; }
    .tree-item-0 { animation: slideRight 0.4s ease-out 0.5s both; }
    .tree-item-1 { animation: slideRight 0.4s ease-out 0.8s both; }
    .tree-item-2 { animation: slideRight 0.4s ease-out 1.1s both; }
    .tree-item-3 { animation: slideRight 0.4s ease-out 1.4s both; }
    .tree-item-4 { animation: slideRight 0.4s ease-out 1.7s both; }
    .detail-0 { animation: fadeIn 0.3s ease-out 1.0s both; }
    .detail-1 { animation: fadeIn 0.3s ease-out 1.3s both; }
    .detail-2 { animation: fadeIn 0.3s ease-out 1.6s both; }
    .detail-3 { animation: fadeIn 0.3s ease-out 1.9s both; }
    .detail-4 { animation: fadeIn 0.3s ease-out 2.2s both; }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#2d0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- VS Code frame -->
  <g class="sidebar" transform="translate(40, 20)">
    <rect x="0" y="0" width="720" height="360" rx="8" ry="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="720" height="30" rx="8" ry="8" fill="#2d2d2d"/>
    <rect x="0" y="18" width="720" height="12" fill="#2d2d2d"/>
    <circle cx="16" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="34" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="52" cy="15" r="5" fill="#28c840"/>

    <!-- Activity bar (left) -->
    <rect x="0" y="30" width="48" height="330" fill="#252526" rx="0" ry="0"/>
    <rect x="0" y="330" width="48" height="30" rx="0" ry="8" fill="#252526"/>
    <!-- File icon -->
    <g transform="translate(14, 48)" fill="#888">
      <rect x="2" y="0" width="16" height="20" rx="2" stroke="#888" stroke-width="1.5" fill="none"/>
      <line x1="6" y1="6" x2="14" y2="6" stroke="#888" stroke-width="1"/>
      <line x1="6" y1="10" x2="14" y2="10" stroke="#888" stroke-width="1"/>
      <line x1="6" y1="14" x2="12" y2="14" stroke="#888" stroke-width="1"/>
    </g>
    <!-- Search icon -->
    <g transform="translate(14, 88)" fill="none" stroke="#888" stroke-width="1.5">
      <circle cx="9" cy="9" r="6"/>
      <line x1="13" y1="13" x2="18" y2="18"/>
    </g>
    <!-- Turborepo icon (active) -->
    <rect x="0" y="115" width="2" height="30" fill="#ef4444"/>
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="24" height="24" rx="5" fill="#ef4444" opacity="0.9"/>
      <text x="12" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="12" fill="white" text-anchor="middle">Tb</text>
    </g>

    <!-- Sidebar panel -->
    <rect x="48" y="30" width="280" height="330" fill="#252526"/>
    <rect x="48" y="330" width="280" height="30" rx="0" ry="8" fill="#252526"/>

    <!-- Panel header -->
    <rect x="48" y="30" width="280" height="28" fill="#2d2d2d"/>
    <text x="62" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#bbbbbb" font-weight="600" text-transform="uppercase" letter-spacing="0.5">TURBOREPO TASKS</text>
    <!-- Refresh icon -->
    <g transform="translate(296, 36)" fill="none" stroke="#888" stroke-width="1.2">
      <path d="M8,2 A6,6 0 1,1 2,8"/>
      <path d="M8,2 L6,0 M8,2 L10,0"/>
    </g>

    <!-- Tree items -->
    <!-- build -->
    <g class="tree-item-0" transform="translate(58, 68)">
      <!-- Expand arrow -->
      <polygon points="4,2 10,7 4,12" fill="#888"/>
      <!-- Play icon -->
      <g transform="translate(18, 0)">
        <polygon points="2,1 12,7 2,13" fill="#ef4444" opacity="0.8"/>
      </g>
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" font-weight="600">build</text>
      <!-- Cache badge -->
      <rect x="84" y="0" width="50" height="15" rx="7" fill="#2563eb" opacity="0.3"/>
      <text x="90" y="11" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa">cached</text>
    </g>
    <g class="detail-0" transform="translate(78, 86)">
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="11" fill="#666">depends: ^build</text>
    </g>

    <!-- test -->
    <g class="tree-item-1" transform="translate(58, 108)">
      <polygon points="4,2 10,7 4,12" fill="#888"/>
      <g transform="translate(18, 0)">
        <polygon points="2,1 12,7 2,13" fill="#ef4444" opacity="0.8"/>
      </g>
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" font-weight="600">test</text>
      <rect x="72" y="0" width="50" height="15" rx="7" fill="#2563eb" opacity="0.3"/>
      <text x="78" y="11" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa">cached</text>
    </g>
    <g class="detail-1" transform="translate(78, 126)">
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="11" fill="#666">depends: build</text>
    </g>

    <!-- dev -->
    <g class="tree-item-2" transform="translate(58, 148)">
      <polygon points="4,2 10,7 4,12" fill="#888"/>
      <g transform="translate(18, 0)">
        <polygon points="2,1 12,7 2,13" fill="#ef4444" opacity="0.8"/>
      </g>
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" font-weight="600">dev</text>
      <rect x="64" y="0" width="68" height="15" rx="7" fill="#9333ea" opacity="0.3"/>
      <text x="70" y="11" font-family="'Cascadia Code', monospace" font-size="9" fill="#c084fc">persistent</text>
    </g>
    <g class="detail-2" transform="translate(78, 166)">
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="11" fill="#666">no cache</text>
    </g>

    <!-- lint -->
    <g class="tree-item-3" transform="translate(58, 188)">
      <polygon points="4,2 10,7 4,12" fill="#888"/>
      <g transform="translate(18, 0)">
        <polygon points="2,1 12,7 2,13" fill="#ef4444" opacity="0.8"/>
      </g>
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" font-weight="600">lint</text>
      <rect x="64" y="0" width="50" height="15" rx="7" fill="#2563eb" opacity="0.3"/>
      <text x="70" y="11" font-family="'Cascadia Code', monospace" font-size="9" fill="#60a5fa">cached</text>
    </g>
    <g class="detail-3" transform="translate(78, 206)">
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="11" fill="#666">no dependencies</text>
    </g>

    <!-- deploy -->
    <g class="tree-item-4" transform="translate(58, 228)">
      <polygon points="4,2 10,7 4,12" fill="#888"/>
      <g transform="translate(18, 0)">
        <polygon points="2,1 12,7 2,13" fill="#ef4444" opacity="0.8"/>
      </g>
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="13" fill="#d4d4d4" font-weight="600">deploy</text>
      <rect x="84" y="0" width="60" height="15" rx="7" fill="#16a34a" opacity="0.3"/>
      <text x="90" y="11" font-family="'Cascadia Code', monospace" font-size="9" fill="#4ade80">no cache</text>
    </g>
    <g class="detail-4" transform="translate(78, 246)">
      <text x="36" y="11" font-family="'Cascadia Code', monospace" font-size="11" fill="#666">depends: build, test, lint</text>
    </g>

    <!-- Editor area (right side) -->
    <rect x="328" y="30" width="392" height="330" fill="#1e1e1e"/>
    <rect x="328" y="330" width="392" height="30" rx="0" ry="8" fill="#1e1e1e"/>

    <!-- Editor tab -->
    <rect x="328" y="30" width="130" height="26" fill="#2d2d2d"/>
    <text x="340" y="47" font-family="'Cascadia Code', monospace" font-size="11" fill="#d4d4d4">turbo.json</text>
    <rect x="328" y="54" width="130" height="2" fill="#ef4444"/>

    <!-- Editor code preview -->
    <g transform="translate(342, 72)" font-family="'Cascadia Code', monospace" font-size="12">
      <g fill="#555">
        <text x="0" y="0">1</text>
        <text x="0" y="18">2</text>
        <text x="0" y="36">3</text>
        <text x="0" y="54">4</text>
        <text x="0" y="72">5</text>
        <text x="0" y="90">6</text>
        <text x="0" y="108">7</text>
        <text x="0" y="126">8</text>
        <text x="0" y="144">9</text>
        <text x="0" y="162">10</text>
        <text x="0" y="180">11</text>
        <text x="0" y="198">12</text>
        <text x="0" y="216">13</text>
        <text x="0" y="234">14</text>
        <text x="0" y="252">15</text>
      </g>
      <g transform="translate(30, 0)">
        <text y="0" fill="#d4d4d4">{</text>
        <text y="18"><tspan fill="#9cdcfe">"tasks"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="36"><tspan fill="#d4d4d4">  </tspan><tspan fill="#9cdcfe">"build"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="54"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"dependsOn"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"^build"</tspan><tspan fill="#d4d4d4">],</tspan></text>
        <text y="72"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"outputs"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"dist/**"</tspan><tspan fill="#d4d4d4">],</tspan></text>
        <text y="90"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"cache"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#569cd6">true</tspan></text>
        <text y="108"><tspan fill="#d4d4d4">  },</tspan></text>
        <text y="126"><tspan fill="#d4d4d4">  </tspan><tspan fill="#9cdcfe">"test"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="144"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"dependsOn"</tspan><tspan fill="#d4d4d4">: [</tspan><tspan fill="#ce9178">"build"</tspan><tspan fill="#d4d4d4">],</tspan></text>
        <text y="162"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"cache"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#569cd6">true</tspan></text>
        <text y="180"><tspan fill="#d4d4d4">  },</tspan></text>
        <text y="198"><tspan fill="#d4d4d4">  </tspan><tspan fill="#9cdcfe">"dev"</tspan><tspan fill="#d4d4d4">: {</tspan></text>
        <text y="216"><tspan fill="#d4d4d4">    </tspan><tspan fill="#9cdcfe">"persistent"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#569cd6">true</tspan></text>
        <text y="234"><tspan fill="#d4d4d4">  }</tspan></text>
        <text y="252"><tspan fill="#d4d4d4">}</tspan></text>
      </g>
    </g>

    <!-- Highlight line for deploy task connection -->
    <rect x="328" y="100" width="392" height="18" fill="#ef4444" opacity="0.06"/>
  </g>
</svg>